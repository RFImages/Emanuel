<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Before / After Sliders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin: 40px 0 20px;
      font-size: 1.6rem;
    }

    .slider-container {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 8px;
      margin: 0 auto 40px;
      background: #000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .slider-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
    }

    .slider-image.after {
      clip-path: inset(0 0 0 50%);
      transition: clip-path 0.05s linear;
    }

    .slider-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: #ffffff;
      cursor: ew-resize;
      transform: translateX(-50%);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
    }

    .slider-handle::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .slider-handle::after {
      content: "⇆";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      color: #555;
    }

    .label {
      position: absolute;
      top: 10px;
      padding: 4px 10px;
      font-size: 12px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .label.before { left: 10px; }
    .label.after { right: 10px; }

    p.note {
      text-align: center;
      color: #666;
      margin-top: -20px;
      margin-bottom: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <!-- SLIDER 1 -->
  <h1>Before / After Comparison 1</h1>

  <div class="slider-container" id="slider1">
    <img src="Is.jpg" class="slider-image before" alt="Before">
    <img src="grey.jpg" class="slider-image after" id="afterImage1" alt="After">

    <div class="slider-handle" id="handle1"></div>
    <div class="label before">Before</div>
    <div class="label after">After</div>
  </div>

  <p class="note">Drag the handle left or right to compare.</p>


  <!-- SLIDER 2 -->
  <h1>Before / After Comparison 2</h1>

  <div class="slider-container" id="slider2">
    <img src="grey.jpg" class="slider-image before" alt="Before">
    <img src="gold.jpg" class="slider-image after" id="afterImage2" alt="After">

    <div class="slider-handle" id="handle2"></div>
    <div class="label before">Before</div>
    <div class="label after">After</div>
  </div>

  <p class="note">Drag the handle left or right to compare.</p>


  <!-- JAVASCRIPT FOR BOTH SLIDERS -->
  <script>
    function initSlider(sliderId, handleId, afterId) {
      const slider = document.getElementById(sliderId);
      const handle = document.getElementById(handleId);
      const afterImage = document.getElementById(afterId);

      let isDragging = false;

      function setPosition(clientX) {
        const rect = slider.getBoundingClientRect();
        let x = clientX - rect.left;
        if (x < 0) x = 0;
        if (x > rect.width) x = rect.width;

        const percent = (x / rect.width) * 100;
        handle.style.left = percent + "%";
        afterImage.style.clipPath = `inset(0 0 0 ${percent}%)`;
      }

      function startDrag(e) {
        isDragging = true;
        if (e.type === "mousedown") setPosition(e.clientX);
        if (e.type === "touchstart") setPosition(e.touches[0].clientX);
      }

      function onMove(e) {
        if (!isDragging) return;
        if (e.type === "mousemove") setPosition(e.clientX);
        if (e.type === "touchmove") {
          e.preventDefault();
          setPosition(e.touches[0].clientX);
        }
      }

      function endDrag() {
        isDragging = false;
      }

      handle.addEventListener("mousedown", startDrag);
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", endDrag);

      handle.addEventListener("touchstart", startDrag, { passive: true });
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", endDrag);
      window.addEventListener("touchcancel", endDrag);
    }

    // Initialize both sliders
    initSlider("slider1", "handle1", "afterImage1");
    initSlider("slider2", "handle2", "afterImage2");
  </script>

</body>
</html>
